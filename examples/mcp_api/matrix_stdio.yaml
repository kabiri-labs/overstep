# Authorization matrix for the bundled vulnerable **stdio** MCP demo server.
#
#   overstep run examples/mcp_api/matrix_stdio.yaml --out out
#
# overstep launches the server process itself (one per subject). Identity is not
# an HTTP header here — the subject's token is injected into the MCP_TOKEN
# environment variable named by `token_env`, and the server reads it at startup.
roles: [anonymous, user, admin]

servers:
  - name: docs
    command: ["python", "examples/mcp_api/stdio_server.py"]
    token_env: MCP_TOKEN          # each subject's token -> this env var

mcp_access:
  is_error_is_deny: true
  jsonrpc_error_is_deny: true

subjects:
  - { name: alice, role: user,  token: alice-token, marker: "alice@corp.example", attributes: { doc_id: d-alice } }
  - { name: bob,   role: user,  token: bob-token,   marker: "bob@corp.example",   attributes: { doc_id: d-bob } }
  - { name: root,  role: admin, token: admin-token }
  - { name: anon,  role: anonymous, token: null }

resources:
  - name: read_document
    transport: mcp
    call: { server: docs, tool: read_document }
    type: object
    owner_arg: doc_id
    owner_attr: doc_id
  - name: list_all_users
    transport: mcp
    call: { server: docs, tool: list_all_users }
    type: function
  - name: reset_tenant
    transport: mcp
    call: { server: docs, tool: reset_tenant, mutating: true }
    type: function

policy:
  read_document:
    allow:
      - { role: user, scope: own }
      - { role: admin, scope: any }
  list_all_users:
    allow:
      - { role: admin }
  reset_tenant:
    allow:
      - { role: admin }
