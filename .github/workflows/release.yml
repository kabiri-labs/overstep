name: Release

# Trigger by pushing a version tag, e.g.:
#   git tag v0.10.0 && git push origin v0.10.0
on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install and test
        run: |
          python -m pip install --upgrade pip build
          pip install -e ".[dev]"
          pytest -q

      - name: Verify tag matches package version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(python -c "import overstep; print(overstep.__version__)")
          echo "tag=$TAG package=$PKG"
          test "$TAG" = "$PKG" || { echo "::error::tag v$TAG does not match package version $PKG"; exit 1; }

      - name: Build sdist and wheel
        run: python -m build

      - name: Extract release notes from CHANGELOG
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" { grab=1; next }
            grab && /^## \[/ { exit }
            grab { print }
          ' CHANGELOG.md > release-notes.md
          echo "----- release notes -----"; cat release-notes.md

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: |
            dist/
            release-notes.md

  github-release:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create the release and attach assets
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: overstep ${{ github.ref_name }}
          body_path: release-notes.md
          files: dist/*
          draft: false
          prerelease: false

  pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    # A dedicated environment makes the trusted-publisher binding explicit and
    # lets you add manual approval / protection rules on PyPI publishes.
    environment:
      name: pypi
      url: https://pypi.org/project/overstep/
    permissions:
      id-token: write   # OIDC token for PyPI trusted publishing (no API token needed)
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist

      - name: Publish distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
