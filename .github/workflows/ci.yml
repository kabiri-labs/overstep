name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install -r requirements.txt
      - name: Unit tests
        run: pytest -q
      - name: Start demo API
        run: |
          nohup python -m uvicorn examples.mock_api.server:app --host 127.0.0.1 --port 8000 &
          for i in $(seq 1 20); do
            curl -sf http://127.0.0.1:8000/users/u1 -H "Authorization: Bearer alice-token" && break
            sleep 0.5
          done
      - name: Run overstep against the demo API
        # The demo API is intentionally vulnerable, so we don't fail the build on
        # its findings — we just prove the tool runs and produces reports.
        run: |
          overstep run examples/mock_api/matrix.yaml --out out --fail-on never
      - name: Archive reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: overstep-report-${{ matrix.python-version }}
          path: out/

  # Example of how a real project would gate a PR on authorization findings and
  # publish them to GitHub code scanning.
  authz-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install -r requirements.txt
      - name: Start demo API
        run: |
          nohup python -m uvicorn examples.mock_api.server:app --host 127.0.0.1 --port 8000 &
          for i in $(seq 1 20); do
            curl -sf http://127.0.0.1:8000/users/u1 -H "Authorization: Bearer alice-token" && break
            sleep 0.5
          done
      - name: overstep authorization scan
        run: overstep run examples/mock_api/matrix.yaml --out out --fail-on never
      - name: Upload SARIF to code scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: out/overstep.sarif
